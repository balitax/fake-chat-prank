name: fake_chat_simulator
description: "A mobile-first Flutter application for creating realistic fake chat conversations"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  shared_preferences: ^2.3.4
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  google_mobile_ads: ^5.3.0
  camera: ^0.11.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
